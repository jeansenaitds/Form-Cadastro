<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <link rel="icon" href="Imagens/debit-card-icon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">
    <h1 class="display-4 text-center bg-dark text-white py-3 shadow fw-light">Formulário de Cadastro</h1>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <form class="p-4 bg-white rounded shadow">
                    <div class="mb-3">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="cidade" class="form-label fw-light">Primeiro nome</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" id="cidade" class="form-control rounded">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="uf" class="form-label fw-light">Sobrenome</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" id="uf" class="form-control rounded">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="nome" class="form-label fw-light">Nome de Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                            <input type="text" id="nome" class="form-control rounded" placeholder="Nome de Usuário">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-light">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="email" class="form-control rounded" placeholder="você@email.com">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="numero" class="form-label fw-light">Endereço</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-house"></i></span>
                            <input type="number" id="numero" min="0" max="9999" class="form-control rounded"
                                placeholder="1234 Rua Principal">
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="pais" class="form-label fw-light">País</label>
                            <select id="pais" class="form-select rounded">
                                <option>Escolher...</option>
                                <option>Brasil</option>
                                <option>Outros</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="estado" class="form-label fw-light">Estado</label>
                            <select id="estado" class="form-select rounded">
                                <option>Escolher...</option>
                                <option>São Paulo</option>
                                <option>Outros</option>
                            </select>
                        </div>
                    </div>
                    <div class="border-top my-4"></div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" id="entrega" class="form-check-input">
                            <label for="entrega" class="form-check-label fw-light">O endereço de entrega é o mesmo que o
                                meu endereço de cobrança</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" id="guardar" class="form-check-input">
                            <label for="guardar" class="form-check-label fw-light">Guarde as informações para a próxima
                                compra</label>
                        </div>
                    </div>
                    <div class="border-top my-4"></div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="radio" id="credito" class="form-check-input" name="pagamento">
                            <label for="credito" class="form-check-label fw-light">Cartão de crédito</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" id="debito" class="form-check-input" name="pagamento">
                            <label for="debito" class="form-check-label fw-light">Cartão de débito</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" id="paypal" class="form-check-input" name="pagamento">
                            <label for="paypal" class="form-check-label fw-light">PayPal</label>
                        </div>
                        <div class="form-check">
                            <input type="radio" id="dinheiro" class="form-check-input" name="pagamento">
                            <label for="dinheiro" class="form-check-label fw-light">Dinheiro ou Pix</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="nome_cartao" class="form-label fw-light">Nome no cartão</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-credit-card"></i></span>
                                    <input type="text" id="nome_cartao" class="form-control rounded">
                                </div>
                                <div class="form-text">Nome completo conforme consta no cartão.</div>
                            </div>
                            <div class="col-md-6">
                                <label for="nome_impresso" class="form-label fw-light">Número do cartão do
                                    crédito</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-credit-card-2-front"></i></span>
                                    <input type="text" id="nome_impresso" class="form-control rounded">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label for="validade" class="form-label fw-light">Validade</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                                    <input type="number" id="validade" class="form-control rounded">
                                </div>
                                <div class="form-text">Ex: 01/2025</div>
                            </div>
                            <div class="col-md-4">
                                <label for="cvv" class="form-label fw-light">CVV</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                    <input type="number" id="cvv" class="form-control rounded">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button class="btn btn-primary btn-lg w-100 rounded shadow-sm" type="submit">Continuar para o
                            checkout</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
